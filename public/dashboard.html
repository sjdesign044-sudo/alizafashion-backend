<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Dashboard
</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#000;
color:#fff;
}

input{
display:block;
margin-bottom:10px;
padding:10px;
width:250px;
background:#111;
border:1px solid #444;
color:#fff;
}

button{
padding:10px 20px;
cursor:pointer;
border:none;
background:gold;
font-weight:bold;
margin-top:10px;
}

#products div,
#orders div{
margin-top:15px;
background:#111;
padding:10px;
border-radius:5px;
}

img{
border-radius:5px;
}

#msg{
margin-top:10px;
color:gold;
font-weight:bold;
}

</style>

</head>

<body>

<h1>
Admin Panel
</h1>

<button id="logoutBtn">
Logout
</button>

<hr>

<!-- =========================
ADD PRODUCT
========================= -->

<div
id="addProductSection"
>

<h2>
Add Product
</h2>

<input
type="text"
id="name"
placeholder="Product Name"
>

<input
type="number"
id="price"
placeholder="Price"
>

<input
type="file"
id="image"
accept="image/*"
multiple
>

<select
id="category"
style="
width:250px;
padding:10px;
margin-bottom:10px;
background:#111;
border:1px solid #444;
color:#fff;
">

<option value="">Select Category</option>

<option value="NEW ARRIVALS">NEW ARRIVALS</option>

<option value="BEST SELLERS">BEST SELLERS</option>

<option value="WEDDING COLLECTION">WEDDING COLLECTION</option>

<option value="PARTY WEAR">PARTY WEAR</option>

<option value="Chinon Silk Saree">Chinon Silk Saree</option>

<option value="Tussar Silk Saree">Tussar Silk Saree</option>

<option value="Tissue Silk Saree">Tissue Silk Saree</option>

<option value="Katan Silk Saree">Katan Silk Saree</option>

<option value="Dola Silk Saree">Dola Silk Saree</option>

<option value="Banarasi Silk Saree">Banarasi Silk Saree</option>

</select>

<input
type="number"
id="stock"
placeholder="Stock"
>

<textarea
id="description"
placeholder="Description"
style="
width:250px;
height:80px;
background:#111;
border:1px solid #444;
color:#fff;
padding:10px;
margin-bottom:10px;
"></textarea>

<textarea
id="details"
placeholder="Product Details"
style="
width:250px;
height:80px;
background:#111;
border:1px solid #444;
color:#fff;
padding:10px;
margin-bottom:10px;
"></textarea>

<textarea
id="fabric"
placeholder="Fabric Information"
style="
width:250px;
height:80px;
background:#111;
border:1px solid #444;
color:#fff;
padding:10px;
margin-bottom:10px;
"></textarea>

<input
type="text"
id="blouseType"
placeholder="Blouse Type"
>

<input
type="text"
id="sareeLength"
placeholder="Saree Length"
>

<textarea
id="shipping"
placeholder="Shipping Information"
style="
width:250px;
height:80px;
background:#111;
border:1px solid #444;
color:#fff;
padding:10px;
margin-bottom:10px;
"></textarea>

<textarea
id="returnPolicy"
placeholder="Return Policy"
style="
width:250px;
height:80px;
background:#111;
border:1px solid #444;
color:#fff;
padding:10px;
margin-bottom:10px;
"></textarea>

<button
id="addProductBtn"
type="button"
>
Add Product
</button>

<p id="msg"></p>

<hr>

</div>

<!-- =========================
PRODUCTS
========================= -->

<div id="dashboardSection">

<h2>
Dashboard
</h2>

<div style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
">

<div style="
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
">
<h3>Total Products</h3>
<h1 id="dashProducts">0</h1>
</div>

<div style="
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
">
<h3>Total Orders</h3>
<h1 id="dashOrders">0</h1>
</div>

<div style="
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
">
<h3>Total Revenue</h3>
<h1 id="dashRevenue">₹0</h1>
</div>

<div style="
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
">
<h3>Total Customers</h3>
<h1 id="dashCustomers">0</h1>
</div>

</div>

</div>

<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">

<button onclick="showSection('addProductSection')">
Add Product
</button>

<button onclick="showSection('dashboardSection')">
Dashboard
</button>

<button onclick="showSection('productsSection')">
Products
</button>

<button onclick="showSection('ordersSection')">
Orders
</button>

<button onclick="showSection('returnsSection')">
Returns
</button>

<button onclick="showSection('customersSection')">
Customers
</button>

<button onclick="showSection('couponsSection')">
Coupons
</button>

<button onclick="showSection('analyticsSection')">
Analytics
</button>

</div>


<!-- PRODUCTS -->

<div id="productsSection">

<h2>Products</h2>

<input
type="text"
id="searchProduct"
placeholder="Search Product"
onkeyup="searchProducts()"
style="width:250px;"
>

<select
id="filterCategory"
onchange="filterByCategory()"
style="width:250px;padding:10px;margin-top:10px;"
>

<option value="">All Categories</option>

<option value="NEW ARRIVALS">NEW ARRIVALS</option>
<option value="BEST SELLERS">BEST SELLERS</option>
<option value="WEDDING COLLECTION">WEDDING COLLECTION</option>
<option value="PARTY WEAR">PARTY WEAR</option>

</select>

<h3>
Total Products:
<span id="totalProducts">0</span>
</h3>

<div id="products"></div>

</div>


<!-- ORDERS -->

<div
id="ordersSection"
style="display:none;"
>

<h2>Orders</h2>

<h3>
Total Orders:
<span id="totalOrders">0</span>
</h3>

<div id="orders"></div>

</div>


<!-- RETURNS -->

<div
id="returnsSection"
style="display:none;"
>

<h2>Returns</h2>

<div id="returns"></div>

</div>


<!-- CUSTOMERS -->

<div
id="customersSection"
style="display:none;"
>

<h2>Customers</h2>

<div id="customers"></div>

</div>


<!-- COUPONS -->

<div
id="couponsSection"
style="display:none;"
>

<h2>Coupons</h2>

<input
id="couponName"
placeholder="Coupon Code (Example: ALIZA10)"
>

<input
id="couponDiscount"
type="number"
placeholder="Discount %"
>

<button onclick="addCoupon()">
Add Coupon
</button>

<hr>

<div id="coupons"></div>

</div>


<!-- ANALYTICS -->

<div
id="analyticsSection"
style="display:none;"
>

<h2>Analytics</h2>

<div id="analytics"></div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script>

function showSection(id){

const sections = [

"dashboardSection",
"addProductSection",
"productsSection",
"ordersSection",
"returnsSection",
"customersSection",
"couponsSection",
"analyticsSection"

];

sections.forEach(sec=>{

const el = document.getElementById(sec);

if(el){
el.style.display="none";
}

});

const active =
document.getElementById(id);

if(active){
active.style.display="block";
}

if(id==="dashboardSection" && window.updateDashboard){
window.updateDashboard();
}

}

</script>


<script type="module">

  import { auth } from "./firebase.js";

import {
addProduct,
logout
} from "./admin.js";

/* =========================
ADMIN CHECK (PASTE HERE FIRST)
========================= */

import { protectAdmin } from "./auth-guard.js";

protectAdmin();

/* =========================
ADD PRODUCT
========================= */

document
.getElementById("addProductBtn")
.addEventListener(
"click",
addProduct
);

/* =========================
LOGOUT
========================= */

document
.getElementById("logoutBtn")
.addEventListener(
"click",
logout
);

</script>

</body>

</html>
