<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
}

/* ================= LAYOUT ================= */
.product-wrapper{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  align-items:flex-start;
}

/* ================= SLIDER ================= */
.slider-box{
  width:420px;
  max-width:100%;
  position:relative;
  overflow:hidden;
  touch-action:pan-y;
  border-radius:18px;
  border:1px solid rgba(212,160,74,.25);
  background:#0f0f0f;
  padding:10px;
}

.slider-box img{
  width:100%;
  height:550px;
  border-radius:14px;
  object-fit:cover;
  transition:all .35s ease;
}

.slider-box img.zoom{
  transform:scale(2);
  cursor:zoom-out;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(212,160,74,.9);
  color:#000;
  font-weight:bold;
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.prev{left:10px;}
.next{right:10px;}

/* dots */
.dots{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:8px;
}

.thumbs{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.thumbs img{
width:70px;
height:90px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
transition:.3s;
}

.thumbs img.active{
border-color:#d4a04a;
}

.thumbs img:hover{
transform:scale(1.05);
border-color:#d4a04a;
}

.dots span{
  width:10px;
  height:10px;
  background:#444;
  border-radius:50%;
  cursor:pointer;
  transition:.3s;
}
.dots span.active{
  background:#d4a04a;
  transform:scale(1.4);
}

/* ================= INFO ================= */
.info{
  max-width:500px;
}

.info h1{
  color:#fff;
  font-size:34px;
  line-height:1.3;
  margin-bottom:10px;
}

.info h2{
  color:#d4a04a;
  font-size:32px;
  margin-bottom:15px;
}

/* qty */
.qty-box{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.qty-box button{
  background:#222;
  color:#fff;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* buttons */
.btn{
  padding:14px 24px;
  border:none;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
}

.cart-btn,
.buy-btn{
  background:#d4a04a;
  color:#000;
}

/* ================= BADGES (FIXED LUXURY VERSION) ================= */
.badges{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
  font-size:13px;
  color:#fff;
}

.badges span{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 15px;
  border:1px solid rgba(212,160,74,0.2);
  border-radius:10px;
  background:#161616;
  transition:.3s;
}

.badges span:hover{
  border-color:#d4a04a;
  transform:translateX(4px);
}

/* ICON STYLE */
.badges .icon{
  width:16px;
  height:16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(212,160,74,0.5);
  border-radius:50%;
  font-size:10px;
  color:#d4a04a;
  background:transparent;
}

/* ================= ACCORDION ================= */
.section{
  margin-top:30px;
}

.accordion-item{
  border-bottom:1px solid #333;
}

.accordion-header{
  display:flex;
  justify-content:space-between;
  padding:14px 0;
  cursor:pointer;
  align-items:center;
}

.arrow{
  font-size:18px;
  transition:0.3s;
  color:#aaa;
}

.accordion-item.active .arrow{
  transform:rotate(180deg);
  color:#d4a04a;
}

.accordion-body{
  max-height:0;
  overflow:hidden;
  transition:0.35s ease;
  color:#ccc;
}

.accordion-item.active .accordion-body{
  max-height:300px;
  padding:10px 0 15px;
}

.accordion-item.active{
  background:transparent !important;
}

/* ================= TOUCH ================= */
.slider-box{
  touch-action:pan-y;
}

.related-section{
margin-top:60px;
padding:0 7% 50px;
}

.related-section h2{
text-align:center;
font-size:32px;
color:#d4a04a;
margin-bottom:25px;
}

.related-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.related-card{
background:#161616;
border:1px solid #333;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.related-card:hover{
transform:translateY(-5px);
border-color:#d4a04a;
}

.related-card img{
width:100%;
height:280px;
object-fit:cover;
}

.related-info{
padding:15px;
}

.related-info h4{
margin-bottom:8px;
}

.related-info p{
color:#d4a04a;
font-weight:bold;
}

.highlights-section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:50px;
padding:0 7%;
}

.highlight-box{
background:#161616;
border:1px solid #2f2f2f;
border-radius:14px;
padding:25px;
text-align:center;
transition:.3s;
}

.highlight-box:hover{
border-color:#d4a04a;
transform:translateY(-5px);
}

.highlight-icon{
width:55px;
height:55px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
border:1px solid #d4a04a;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#d4a04a;
}

.highlight-box h3{
margin-bottom:10px;
color:#fff;
}

.highlight-box p{
font-size:14px;
color:#bdbdbd;
line-height:1.6;
}

</style>
</head>

<body>

<div id="productDetail" style="padding:40px 7%;"></div>

<div class="highlights-section">

<div class="highlight-box">
<div class="highlight-icon">★</div>
<h3>Premium Quality</h3>
<p>Luxury fabric with premium finishing.</p>
</div>

<div class="highlight-box">
<div class="highlight-icon">✓</div>
<h3>100% Authentic</h3>
<p>Trusted quality directly from ALIZAFASHION.</p>
</div>

<div class="highlight-box">
<div class="highlight-icon">🚚</div>
<h3>Fast Delivery</h3>
<p>Delivery across India within 3–7 days.</p>
</div>

<div class="highlight-box">
<div class="highlight-icon">🔒</div>
<h3>Secure Shopping</h3>
<p>Safe ordering and customer support.</p>
</div>

</div>

<div class="related-section">

<h2>Related Products</h2>

<div id="relatedProducts" class="related-grid"></div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let product=null;
let images=[];
let current=0;
let qty=1;
let startX=0;

/* ================= LOAD ================= */
async function loadProduct(){

const snap = await getDoc(doc(db,"products",id));
if(!snap.exists()) return;

product = snap.data();

images = product.images?.length ? product.images : [product.image];

document.getElementById("productDetail").innerHTML = `
<div class="product-wrapper">

<!-- SLIDER -->
<div class="slider-box"
ontouchstart="touchStart(event)"
ontouchend="touchEnd(event)">

<button class="nav prev" onclick="prev()">❮</button>

<img id="img" src="${images[0]}" onclick="zoom(this)">

<button class="nav next" onclick="next()">❯</button>

<div class="dots" id="dots"></div>

<div id="thumbs" class="thumbs"></div>

</div>

<!-- INFO -->
<div class="info">

<h1>${product.name}</h1>

<p style="
color:#bdbdbd;
margin:10px 0 15px;
line-height:1.7;
">
${product.description || "Premium luxury collection crafted with elegance."}
</p>

<h2>₹${product.price}</h2>

<p>Taxes included</p>
<p>Shipping calculated at checkout</p>

<div class="qty-box">
<button onclick="dec()">-</button>
<span id="qtyText">1</span>
<button onclick="inc()">+</button>
</div>

<button class="btn cart-btn" onclick="addToCart()">ADD TO CART</button>
<button class="btn buy-btn" onclick="buyNow()">BUY NOW</button>

</div>
</div>

<!-- ACCORDION -->
<div class="section">

${acc(
"Product Details",
product.details || product.description || "No details available."
)}

${acc(
"Fabric Information",
product.fabric || "Premium Fabric"
)}

${acc(
"Shipping Information",
"Delivery in 3–7 working days."
)}

${acc(
"Exchange & Return Policy",
"7 days return available if unused."
)}

${acc(
"Care Instructions",
"Dry clean recommended."
)}

${acc(
"Disclaimer",
"Color may vary slightly due to screen."
)}

</div>
`;

initDots();
updateImage();

loadRelatedProducts();
}

async function loadRelatedProducts(){

const box =
document.getElementById("relatedProducts");

if(!box) return;

const snap =
await getDocs(
collection(db,"products")
);

box.innerHTML = "";

snap.forEach((d)=>{

if(d.id === id) return;

const p = d.data();

box.innerHTML += `

<div
class="related-card"
onclick="location.href='product.html?id=${d.id}'"
>

<img src="${p.image}">

<div class="related-info">

<h4>${p.name}</h4>

<p>₹${p.price}</p>

</div>

</div>

`;

});

}

/* ================= ACCORDION ================= */
function acc(title,text){
return `
<div class="accordion-item" onclick="this.classList.toggle('active')">
<div class="accordion-header">
<span>${title}</span>
<span class="arrow">^</span>
</div>
<div class="accordion-body">${text}</div>
</div>
`;
}

/* ================= SLIDER ================= */
function updateImage(){

document.getElementById("img").src =
images[current];

document
.querySelectorAll("#dots span")
.forEach((d,i)=>{
d.classList.toggle(
"active",
i===current
);
});

document
.querySelectorAll("#thumbs img")
.forEach((img,i)=>{
img.classList.toggle(
"active",
i===current
);
});

}

function initDots(){

document.getElementById("dots").innerHTML =
images.map((_,i)=>
`<span onclick="go(${i})"></span>`
).join("");

document.getElementById("thumbs").innerHTML =
images.map((img,i)=>
`<img src="${img}" onclick="go(${i})">`
).join("");

updateImage();

}

window.next=()=>{
current=(current+1)%images.length;
updateImage();
};

window.prev=()=>{
current=(current-1+images.length)%images.length;
updateImage();
};

window.go=(i)=>{
current=i;
updateImage();
};

/* ================= SWIPE ================= */
window.touchStart=(e)=>{
startX=e.touches[0].clientX;
};

window.touchEnd=(e)=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50) next();
if(endX-startX>50) prev();
};

/* ================= ZOOM ================= */
window.zoom=(img)=>{
img.classList.toggle("zoom");
};

/* ================= QTY ================= */
window.inc=()=>{
qty++;
document.getElementById("qtyText").innerText=qty;
};

window.dec=()=>{
if(qty>1) qty--;
document.getElementById("qtyText").innerText=qty;
};

window.addToCart = () => {

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const existing =
cart.find(item => item.id === id);

if(existing){

existing.qty += qty;

}else{

cart.push({
id:id,
name:product.name,
price:Number(product.price),
image:product.image || images[0],
qty:qty
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Product Added To Cart ✅");

};

window.buyNow = () => {

localStorage.setItem(
"checkoutProduct",
JSON.stringify({
id:id,
name:product.name,
price:Number(product.price),
image:product.image || images[0],
qty:qty
})
);

window.location.href = "checkout.html";

};

/* ================= INIT ================= */
loadProduct();

</script>

<!-- Razorpay Checkout -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
