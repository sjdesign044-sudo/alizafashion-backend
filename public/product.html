<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
}

/* ================= LAYOUT ================= */
.product-wrapper{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  align-items:flex-start;
}

/* ================= SLIDER ================= */
.thumbs img,
.thumbs img.active,
.thumbs img:hover{
border:none !important;
box-shadow:none !important;
outline:none !important;
}

.slider-box img{
  width:100%;
  height:500px;
  object-fit:contain;
  display:block;
  background:#111;
  touch-action:pinch-zoom;
  -webkit-user-drag:none;
  box-shadow:none;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#d4a04a;
  color:#000;
  border:none;
  border-radius:10px;
  width:36px;
  height:36px;
  font-size:16px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

/* dots */
.dots{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:8px;
}

.thumbs{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.thumbs img{
width:70px;
height:90px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
transition:.3s;
}

.thumbs img.active{
border:none;
box-shadow:none;
}

.thumbs img:hover{
transform:scale(1.05);
border:none;
}

.thumbs img,
.thumbs img.active,
.thumbs img:hover{
border:none !important;
box-shadow:none !important;
outline:none !important;
}

.dots span{
  width:10px;
  height:10px;
  background:#444;
  border-radius:50%;
  cursor:pointer;
  transition:.3s;
}
.dots span.active{
  background:#d4a04a;
  transform:scale(1.4);
}

/* ================= INFO ================= */
.info{
  max-width:500px;
}

.info h1{
  color:#fff;
  font-size:34px;
  line-height:1.3;
  margin-bottom:10px;
}

.info h2{
  color:#d4a04a;
  font-size:32px;
  margin-bottom:15px;
}

/* qty */
.qty-box{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.qty-box button{
  background:#222;
  color:#fff;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* buttons */

.btn{
  height:42px;
  padding:0 20px;
  border:none;
  font-weight:600;
  border-radius:6px;
  cursor:pointer;
  margin-right:8px;
  font-size:14px;
}

.cart-btn,
.buy-btn{
min-width:140px;
  background:#d4a04a;
  color:#000;
}

/* ================= ACCORDION ================= */
.section{
  margin-top:30px;
}

.accordion-item{
  border-bottom:1px solid #333;
}

.accordion-header{
  display:flex;
  justify-content:space-between;
  padding:14px 0;
  cursor:pointer;
  align-items:center;
}

.arrow{
font-size:14px;
color:#d4a04a;
transition:.4s ease;
font-weight:bold;
}

.accordion-item.active .arrow{
  transform:rotate(180deg);
  color:#d4a04a;
}

.accordion-body{
max-height:0;
overflow:hidden;
color:#ccc;
transition:
max-height .45s ease,
padding .45s ease;
}

.accordion-item.active .accordion-body{
  max-height:300px;
  padding:10px 0 15px;
}

.accordion-item.active{
  background:transparent !important;
}

/* ================= TOUCH ================= */
.slider-box{
  position:relative;
  width:450px;
  max-width:100%;
  overflow:hidden;
  touch-action:pan-y;
}

.related-section{
margin-top:60px;
padding:0 7% 50px;
}

.related-section h2{
text-align:center;
font-size:32px;
color:#d4a04a;
margin-bottom:25px;
}

.related-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.related-card{
background:#161616;
border:1px solid #333;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.related-card:hover{
transform:translateY(-5px);
border-color:#d4a04a;
}

.related-card img{
width:100%;
height:280px;
object-fit:cover;
}

.related-info{
padding:15px;
}

.related-info h4{
margin-bottom:8px;
}

.related-info p{
color:#d4a04a;
font-weight:bold;
}

.highlights-section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:50px;
padding:0 7%;
}

.highlight-box{
background:#161616;
border:none;
border-radius:14px;
padding:25px;
text-align:center;
transition:.3s;
box-shadow:0 0 0 1px rgba(255,255,255,.06);
}

.highlight-box:hover{
transform:translateY(-5px);
box-shadow:
0 0 0 1px rgba(212,160,74,.25),
0 10px 30px rgba(212,160,74,.12);
}

.highlight-icon{
width:55px;
height:55px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
border:1px solid #d4a04a;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#d4a04a;
}

.highlight-icon svg{
width:28px;
height:28px;
stroke:#d4a04a;
fill:none;
stroke-width:2;
stroke-linecap:round;
stroke-linejoin:round;
}

.highlight-box h3{
margin-bottom:10px;
color:#fff;
}

.highlight-box p{
font-size:14px;
color:#bdbdbd;
line-height:1.6;
}

@media(max-width:768px){

.product-wrapper{
flex-direction:column;
}

.slider-box{
width:100%;
}

.slider-box img{
height:380px;
}

.info h1{
font-size:24px;
}

.info h2{
font-size:26px;
}

.btn{
width:100%;
margin-top:10px;
margin-right:0;
}

.thumbs{
justify-content:center;
gap:8px;
flex-wrap:nowrap;
overflow-x:auto;
padding:0 10px;
}

.thumbs img{
width:65px;
height:85px;
object-fit:cover;
flex-shrink:0;
}

.dots{
justify-content:center;
margin-top:10px;
}

.slider-box{
display:flex;
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<div id="productDetail" style="padding:40px 7%;"></div>

<div class="highlights-section">

<div class="highlight-box">

<div class="highlight-icon">
<svg viewBox="0 0 24 24">
<path d="M12 2L14.8 8.2L21.5 8.8L16.5 13.2L18 20L12 16.5L6 20L7.5 13.2L2.5 8.8L9.2 8.2Z"/>
</svg>
</div>

<h3>Premium Quality</h3>
<p>Luxury fabric with premium finishing.</p>

</div>

<div class="highlight-box">

<div class="highlight-icon">
<svg viewBox="0 0 24 24">
<path d="M12 2L20 6V12C20 17 16 20 12 22C8 20 4 17 4 12V6L12 2Z"/>
<path d="M9 12L11 14L15 10"/>
</svg>
</div>

<h3>100% Authentic</h3>
<p>Trusted quality directly from ALIZAFASHION.</p>

</div>

<div class="highlight-box">

<div class="highlight-icon">
<svg viewBox="0 0 24 24">
<path d="M3 12H15"/>
<path d="M11 8L15 12L11 16"/>
<path d="M17 8H21"/>
<path d="M17 16H21"/>
</svg>
</div>

<h3>Fast Delivery</h3>
<p>Delivery across India within 3–7 days.</p>

</div>

<div class="highlight-box">

<div class="highlight-icon">
<svg viewBox="0 0 24 24">
<path d="M12 3L19 7V12C19 17 15.5 20 12 21C8.5 20 5 17 5 12V7L12 3Z"/>
</svg>
</div>

<h3>Secure Shopping</h3>
<p>Safe ordering and customer support.</p>

</div>

</div>

<div class="related-section">

<h2>Related Products</h2>

<div id="relatedProducts" class="related-grid"></div>

</div>

<script type="module">

  import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
PRODUCT ID
========================= */
const id = new URLSearchParams(location.search).get("id");

if(!id){

location.href = "index.html";

throw new Error("Product ID Missing");

}

let product=null;
let images=[];
let current=0;
let qty=1;

/* ================= LOAD ================= */
async function loadProduct(){

  const snap = await getDoc(
doc(db,"products",id)
);

if(!snap.exists()){

alert("Product Not Found");

window.location.href =
"index.html";

return;

}

  product = snap.data();
  images = product.images?.length ? product.images : [product.image];

  document.getElementById("productDetail").innerHTML = `
    <div class="product-wrapper">

      <div class="slider-box"
      ontouchstart="touchStart(event)"
      ontouchend="touchEnd(event)">

        <button class="nav prev" onclick="prev()">❮</button>

        <img id="img" src="${images[0] || 'https://via.placeholder.com/500'}">

        <button class="nav next" onclick="next()">❯</button>

        <div class="dots" id="dots"></div>
        <div id="thumbs" class="thumbs"></div>

      </div>

      <div class="info">
        <h1>${product.name}</h1>

        <p style="color:#bdbdbd;margin:10px 0 15px;line-height:1.7;">
          ${product.description || "Premium luxury collection crafted with elegance."}
        </p>

        <h2>₹${product.price}</h2>

        <div class="qty-box">
          <button onclick="dec()">-</button>
          <span id="qtyText">1</span>
          <button onclick="inc()">+</button>
        </div>

        <button class="btn cart-btn" onclick="addToCart()">ADD TO CART</button>
        <button class="btn buy-btn" onclick="buyNow()">BUY NOW</button>

        <div class="section">

${acc(
"📋 Product Details",
product.details || product.description || "No details available."
)}

${acc(
"🧵 Fabric Information",
product.fabric || "Premium Fabric"
)}

${acc(
"👚 Blouse Type",
product.blouseType || "Running Blouse"
)}

${acc(
"📏 Saree Length",
product.sareeLength || "5.5 Meter"
)}

${acc(
"🚚 Shipping Information",
product.shipping || "Delivery in 3–7 working days."
)}

${acc(
"↺ Exchange & Return Policy",
product.returnPolicy || "7 days return available if unused."
)}

</div>

      </div>
    </div>
  `;

  initDots();
  updateImage();

  // 🔥 IMPORTANT: zoom yaha initialize hoga
  initPinchZoom();

  loadRelatedProducts();
}

window.addEventListener("load", loadProduct);

/* ================= SLIDER ================= */

function updateImage(){
  document.getElementById("img").src =
images[current] || "https://via.placeholder.com/500";

  document.querySelectorAll("#dots span")
  .forEach((d,i)=>{
    d.classList.toggle("active", i===current);
  });

  document.querySelectorAll("#thumbs img")
  .forEach((img,i)=>{
    img.classList.toggle("active", i===current);
  });

  scale = 1;
  posX = 0;
  posY = 0;

  if (img) applyTransform();
}

function initDots(){
  document.getElementById("dots").innerHTML =
    images.map((_,i)=>`<span onclick="go(${i})"></span>`).join("");

  document.getElementById("thumbs").innerHTML =
    images.map((img,i)=>`<img src="${img}" onclick="go(${i})">`).join("");

  updateImage();
}

window.next=()=>{
  current=(current+1)%images.length;
  updateImage();
};

window.prev=()=>{
  current=(current-1+images.length)%images.length;
  updateImage();
};

window.go=(i)=>{
  current=i;
  updateImage();
};

/* ================= SWIPE ================= */

window.touchStart=(e)=>{
  startX=e.touches[0].clientX;
};

window.touchEnd=(e)=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  if(endX-startX>50) prev();
};

/* ================= QTY ================= */

window.inc=()=>{
  qty++;
  document.getElementById("qtyText").innerText=qty;
};

window.dec=()=>{
  if(qty>1) qty--;
  document.getElementById("qtyText").innerText=qty;
};

/* ================= ZOOM SYSTEM ================= */

let scale = 1;
let posX = 0;
let posY = 0;

let startDist = 0;
let startScale = 1;

let startX = 0;
let startY = 0;

let img = null;

let isDragging = false;

function initPinchZoom(){

  img = document.getElementById("img");
  if(!img) return;

  img.style.touchAction = "none";

  img.addEventListener("touchstart",(e)=>{

    if(e.touches.length === 2){
      startDist = getDist(e.touches[0], e.touches[1]);
      startScale = scale;
    }

    if(e.touches.length === 1 && scale > 1){

  isDragging = true;

  startX = e.touches[0].clientX - posX;
  startY = e.touches[0].clientY - posY;
}

  },{passive:false});

  img.addEventListener("touchmove",(e)=>{

  e.preventDefault();

  if(e.touches.length === 2){

    let newDist = getDist(e.touches[0], e.touches[1]);

    if(startDist === 0) return;

    scale = startScale * (newDist / startDist);

    scale = Math.min(Math.max(scale,1),3);

    applyTransform();
  }

  if(isDragging && e.touches.length === 1 && scale > 1){

    posX = e.touches[0].clientX - startX;

    posY = e.touches[0].clientY - startY;

    applyTransform();
  }

},{passive:false});

img.addEventListener("touchend",()=>{

  isDragging = false;

  if(scale <= 1){

    posX = 0;
    posY = 0;

    applyTransform();
  }

});

}

function applyTransform(){
  img.style.transform =
`translate3d(${posX}px, ${posY}px, 0) scale(${scale})`;
}

function getDist(t1,t2){
  let dx = t1.clientX - t2.clientX;
  let dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

/* ================= CART ================= */

window.addToCart = () => {

  if(
Number(product.stock || 0) <= 0
){

alert(
"Out Of Stock"
);

return;

}

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const existing = cart.find(item => item.id === id);

  if(existing){
    existing.qty += qty;
  } else {
    cart.push({
      id,
      name:product.name,
      price:Number(product.price),
      image:images[0] || product.image,
      qty
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Product Added To Cart ✅");
};

window.buyNow = () => {

  if(
Number(product.stock || 0) <= 0
){

alert(
"Out Of Stock"
);

return;

}

  localStorage.setItem("checkoutProduct", JSON.stringify({
id,
name:product.name,
price:Number(product.price),
image:images[0] || product.image,
qty,
stock:Number(product.stock || 0)
}));

  window.location.href = "checkout.html";
};

/* ================= RELATED ================= */

function acc(title,text){

return `
<div class="accordion-item">

<div class="accordion-header">
<span>${title}</span>
<span class="arrow">+</span>
</div>

<div class="accordion-body">
${text}
</div>

</div>
`;

}

document.addEventListener("click",(e)=>{

const header =
e.target.closest(".accordion-header");

if(!header) return;

const item = header.parentElement;

item.classList.toggle("active");

const arrow =
item.querySelector(".arrow");

arrow.textContent =
item.classList.contains("active")
? "−"
: "+";

});

async function loadRelatedProducts(){

  const box = document.getElementById("relatedProducts");
  if(!box) return;

  const snap = await getDocs(collection(db,"products"));

  box.innerHTML = "";

let count = 0;

  for(const d of snap.docs){

    if(count >= 4) break;

    if(d.id === id) continue;

    const p = d.data();

    box.innerHTML += `
      <div class="related-card"
      onclick="location.href='product.html?id=${d.id}'">

        <img src="${p.image || p.images?.[0] || 'https://via.placeholder.com/300'}">

        <div class="related-info">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
        </div>

      </div>
    `;
    count++;
  }

}
</script>

<!-- Razorpay Checkout -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
