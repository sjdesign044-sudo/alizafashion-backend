<!DOCTYPE html>
<html>
<head>
<title>Your Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial;background:#111;color:#fff;padding:20px;">

<h2>Your Orders</h2>

<input id="phone" placeholder="Enter Phone Number"
style="width:100%;padding:12px;margin-top:10px;background:#222;color:#fff;border:none;border-radius:8px;">

<button onclick="loadOrders()"
style="margin-top:10px;padding:10px 15px;background:#d4a04a;border:none;font-weight:bold;">
Get Orders
</button>

<div id="orders" style="margin-top:20px;"></div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.loadOrders = async function(){

const phone = document.getElementById("phone").value;

if(!/^[6-9]\d{9}$/.test(phone)){
alert("Enter Valid Mobile Number");
return;
}

const q = query(collection(db,"orders"), where("customerPhone","==",phone));

const snap = await getDocs(q);

let html = "";

snap.forEach(doc => {

const d = doc.data();

html += `
<div style="
background:#1a1a1a;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #333;
">

<img
src="${d.items[0].image}"
style="
width:100%;
max-width:180px;
border-radius:10px;
display:block;
margin:auto;
">

<h3 style="margin-top:15px;">
${d.items[0].name}
</h3>

<p><b>Order Number:</b> ${d.orderNumber}</p>

<p><b>Status:</b> ${d.status}</p>

<p><b>Payment:</b> ${d.paymentMethod}</p>

<p><b>Payment Status:</b> ${d.paymentStatus}</p>

<p><b>Qty:</b> ${d.items[0].qty}</p>

<p><b>Total:</b> ₹${d.total}</p>

<p><b>Order Date:</b> ${d.orderDate}</p>

<p><b>Cancellation Code:</b> ${d.cancellationCode}</p>

${
(d.status==="Pending" || d.status==="Confirmed")
?
`<button
onclick="cancelOrder('${d.orderNumber}','${d.cancellationCode}')"
style="
margin-top:10px;
background:#ff4444;
color:#fff;
padding:10px;
border:none;
border-radius:8px;
width:100%;
">
Cancel Order
</button>`
:
`<p style="color:#66ff99;">
Cancellation Not Available
</p>`
}

</div>
`;

});

document.getElementById("orders").innerHTML = html || "No Orders Found";
};

window.cancelOrder = async function(orderNumber,cancellationCode){

const reason = prompt("Cancel Reason?");

if(reason===null){
return;
}

const res = await fetch("https://alizafashion-backend.onrender.com/cancel-order", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

orderNumber,

cancellationCode,

reason

})

});

const data = await res.json();

alert(data.message);

setTimeout(()=>{
loadOrders();
},500);

};

</script>

</body>
</html>
