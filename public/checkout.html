<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Checkout</title>
<style>
body{
background:#111;
color:#fff;
font-family:Arial;
padding:30px;
}
.container{
max-width:700px;
margin:auto;
}
.product-box{
border:1px solid #333;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}
.product-box img{
width:100px;
border-radius:8px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin:8px 0;
background:#1a1a1a;
border:1px solid #333;
color:#fff;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

.payment-box{
margin-top:20px;
padding:15px;
border:1px solid #333;
border-radius:10px;
}
button{
width:100%;
padding:15px;
margin-top:20px;
background:#d4a04a;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}
</style>
</head>
<body>
<div class="container">
<h2>Checkout</h2>
<div id="productInfo" class="product-box"></div>
<p id="discountDisplay" style="color:#4caf50;"></p>

<h3 id="finalAmount" style="color:#d4a04a;">
Total Payable: ₹0
</h3>
<input id="name" placeholder="Full Name">
<input
id="phone"
type="tel"
inputmode="numeric"
placeholder="Mobile Number">
<textarea id="address" placeholder="Full Address"></textarea>
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input
id="pincode"
type="tel"
inputmode="numeric"
placeholder="Pincode">
<div class="payment-box">
<h3>Select Payment Method</h3>
<div class="payment-box">

<h3>Coupon Code</h3>

<input
type="text"
id="couponCode"
placeholder="Enter Coupon Code"
>

<button
type="button"
onclick="applyCoupon()"
style="
margin-top:10px;
background:#28a745;
color:white;
"
>
Apply Coupon
</button>

<p
id="discountText"
style="
margin-top:10px;
color:#4caf50;
"
></p>

</div>

<label>
<input type="radio" name="payment" value="online" checked>
Online Payment
</label>
<label>
<input type="radio" name="payment" value="cod">
Cash On Delivery
</label>
</div>
<button id="placeOrderBtn" onclick="placeOrder()">
PLACE ORDER
</button>
</div>
<script type="module">
import { db } from "./firebase.js";
import {
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

fetch(
"https://alizafashion-backend.onrender.com/health"
).catch(()=>{});

const product =
JSON.parse(
localStorage.getItem("checkoutProduct")
);

if(!product){

alert("No Product Found");

window.location.href =
"index.html";

throw new Error(
"Checkout Product Missing"
);

}

if(product){

const total =
Number(product.price) *
Number(product.qty);

document.getElementById("productInfo").innerHTML = `
<img src="${product.image}">
<h3>${product.name}</h3>
<p>Qty: ${product.qty}</p>
<p>Total: ₹${total}</p>
`;

document.getElementById("finalAmount").innerText =
"Total Payable: ₹" + total;

}

let orderProcessing = false;

let discountAmount = 0;

window.applyCoupon = function(){

const paymentMethod =
document.querySelector(
'input[name="payment"]:checked'
).value;

if(paymentMethod !== "online"){

discountAmount = 0;

document.getElementById("discountText").innerText =
"Coupon valid only for Online Payment";

return;

}

const code =
document.getElementById("couponCode")
.value
.trim()
.toUpperCase();

const total =
Number(product.price) *
Number(product.qty);

if(code === "ALIZA10"){

discountAmount =
Math.floor(total * 0.10);

document.getElementById("discountText").innerText =
"10% Discount Applied ✅";

document.getElementById("discountDisplay").innerText =
"Discount: ₹" + discountAmount;

document.getElementById("finalAmount").innerText =
"Total Payable: ₹" + (total - discountAmount);

}else{

discountAmount = 0;

document.getElementById("discountText").innerText =
"Invalid Coupon ❌";

document.getElementById("discountDisplay").innerText = "";

document.getElementById("finalAmount").innerText =
"Total Payable: ₹" + total;

}

}

document.querySelectorAll(
'input[name="payment"]'
).forEach(radio => {

radio.addEventListener("change", () => {

const total =
Number(product.price) *
Number(product.qty);

if(radio.value === "cod"){

discountAmount = 0;

document.getElementById(
"discountText"
).innerText = "";

document.getElementById(
"discountDisplay"
).innerText = "";

document.getElementById(
"finalAmount"
).innerText =
"Total Payable: ₹" + total;

}

});

});

window.placeOrder = async function(){

if(orderProcessing) return;

orderProcessing = true;

const btn =
document.getElementById("placeOrderBtn");

if(btn.disabled) return;

btn.disabled = true;
btn.innerText = "Processing...";

const name =
document.getElementById("name").value.trim();
const phone =
document.getElementById("phone").value.trim();
const address =
document.getElementById("address").value.trim();
const city =
document.getElementById("city").value.trim();
const state =
document.getElementById("state").value.trim();
const pincode =
document.getElementById("pincode").value.trim();

if(!/^[6-9]\d{9}$/.test(phone)){

orderProcessing = false;

btn.disabled = false;
btn.innerText = "PLACE ORDER";

alert("Enter Valid Mobile Number");

return;

}

if(!/^\d{6}$/.test(pincode)){

orderProcessing = false;

btn.disabled = false;
btn.innerText = "PLACE ORDER";

alert("Enter Valid Pincode");

return;

}

if(
!name ||
!phone ||
!address ||
!city ||
!state ||
!pincode
){

orderProcessing = false;

btn.disabled = false;
btn.innerText = "PLACE ORDER";

alert("Please fill all details");

return;
}

const paymentMethod =
document.querySelector(
'input[name="payment"]:checked'
).value;

/* COD ORDER */

if(paymentMethod === "cod"){
const orderNumber =
"ALZ" + Date.now();
await addDoc(
collection(db,"orders"),

{

invoiceNo:"INV"+Date.now(),

orderDate:new Date().toLocaleDateString("en-IN"),

customerName:name,
customerPhone:phone,

customerAddress:
`${address}, ${city}, ${state}, ${pincode}`,

items:[
{
id:product.id,
name:product.name,
price:product.price,
image:product.image,
qty:product.qty
}
],

total:
Math.round(
Number(product.price) *
Number(product.qty)
),

paymentMethod:"COD",

paymentStatus:"Pending",

status:"Pending",

orderNumber:
orderNumber,

createdAt:
serverTimestamp()
}
);

localStorage.setItem(
"lastOrderNumber",
orderNumber
);
localStorage.removeItem(
"checkoutProduct"
);

localStorage.removeItem("cart");

btn.disabled = false;
btn.innerText = "PLACE ORDER";

window.location.href="order-success.html";
return;
}

/* ONLINE PAYMENT */

try{

console.time("order");  

const response = await fetch(
"https://alizafashion-backend.onrender.com/create-order",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
amount:
Math.round(
(Number(product.price) * Number(product.qty))
- discountAmount
)
})

}
);
const order =
await response.json();
console.timeEnd("order");
console.log("ORDER RESPONSE:", order);
const options = {
key:"rzp_live_SxDAPoGKvcv1pm",
amount:order.amount,
currency:"INR",
name:"ALIZAFASHION",
description:product.name,
image:product.image,
order_id:order.id,
prefill:{
name:name,
contact:phone
},
theme:{
color:"#d4a04a"
},
handler: async function(){

const orderNumber =
"ALZ" + Date.now();

await addDoc(
collection(db,"orders"),

{

invoiceNo:"INV"+Date.now(),

orderDate:new Date().toLocaleDateString("en-IN"),

customerName:name,
customerPhone:phone,

customerAddress:
`${address}, ${city}, ${state}, ${pincode}`,

items:[
{
id:product.id,
name:product.name,
price:product.price,
image:product.image,
qty:product.qty
}
],

total:
(Number(product.price) *
Number(product.qty))
- discountAmount,

paymentMethod:"ONLINE",

paymentStatus:"Paid",

status:"Confirmed",

orderNumber:
orderNumber,

createdAt:
serverTimestamp()
}
);

localStorage.setItem(
"lastOrderNumber",
orderNumber
);
localStorage.removeItem(
"checkoutProduct"
);

localStorage.removeItem("cart");

window.location.href="order-success.html";
}
};

if(typeof Razorpay === "undefined"){

btn.disabled = false;
btn.innerText = "PLACE ORDER";

alert("Payment Gateway Not Loaded");

return;

}

const rzp = new Razorpay(options);

btn.disabled = false;
btn.innerText = "PLACE ORDER";

setTimeout(()=>{
rzp.open();
},100);

}catch(error){

orderProcessing = false;

btn.disabled = false;
btn.innerText = "PLACE ORDER";

console.log("PAYMENT ERROR:", error);

alert(
"Payment Failed\n\n" +
(error?.message || JSON.stringify(error))
);

}

}
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
</html>
