<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
ALIZAFASHION ADMIN
</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#111;
color:#fff;
}

input,
select{
display:block;
margin-bottom:10px;
padding:10px;
width:250px;
background:#222;
border:1px solid #444;
color:#fff;
}

button{
padding:10px 20px;
cursor:pointer;
border:none;
background:gold;
font-weight:bold;
margin-top:10px;
}

#products div,
#orders div{
margin-top:15px;
background:#222;
padding:10px;
border-radius:5px;
}

img{
border-radius:5px;
}

#msg{
margin-top:10px;
color:gold;
font-weight:bold;
}

</style>

</head>

<body>

<h1>
Admin Dashboard
</h1>

<button id="logoutBtn">
Logout
</button>
<div
id="stats"
style="
display:flex;
gap:20px;
margin-top:20px;
margin-bottom:20px;
"
>

<div
style="
background:#222;
padding:15px;
border-radius:8px;
"
>

<h3>Total Products</h3>

<p id="totalProducts">
0
</p>

</div>

<div
style="
background:#222;
padding:15px;
border-radius:8px;
"
>

<h3>Total Orders</h3>

<p id="totalOrders">
0
</p>

</div>

</div>

<hr>

<h2>
Add Product
</h2>

<input
type="text"
id="name"
placeholder="Product Name"
>

<input
type="number"
id="price"
placeholder="Price"
>

<textarea
id="description"
placeholder="Product Description"
rows="4">
</textarea>

<textarea
id="details"
placeholder="Product Details"
rows="4">
</textarea>

<input
type="text"
id="fabric"
placeholder="Fabric Type"
>

<input
type="text"
id="blouseType"
placeholder="Blouse Type"
>

<input
type="text"
id="sareeLength"
placeholder="Saree Length"
>

<textarea
id="shipping"
placeholder="Shipping Information"
rows="3">
</textarea>

<textarea
id="returnPolicy"
placeholder="Exchange & Return Policy"
rows="3">
</textarea>

<input
type="number"
id="stock"
placeholder="Stock Quantity"
>

<select id="category">

<option value="">Select Category</option>

<option value="NEW ARRIVALS">NEW ARRIVALS</option>

<option value="BEST SELLERS">BEST SELLERS</option>

<option value="WEDDING COLLECTION">WEDDING COLLECTION</option>

<option value="PARTY WEAR">PARTY WEAR</option>

<option value="Chinon Silk Saree">Chinon Silk Saree</option>

<option value="Tussar Silk Saree">Tussar Silk Saree</option>

<option value="Tissue Silk Saree">Tissue Silk Saree</option>

<option value="Katan Silk Saree">Katan Silk Saree</option>

<option value="Dola Silk Saree">Dola Silk Saree</option>

<option value="Banarasi Silk Saree">Banarasi Silk Saree</option>

</select>

<input
type="file"
id="image"
accept="image/*"
>
<img
id="preview"
src=""
style="
display:none;
width:120px;
margin-top:10px;
border-radius:8px;
">

<button
id="addProductBtn"
type="button">
Add Product
</button>

<p id="msg"></p>

<hr>

<h2>
All Products
</h2>

<input
type="text"
id="searchProduct"
placeholder="Search Product"
>

<div id="products"></div>

<hr>

<h2>
All Orders
</h2>

<div id="orders"></div>

<script type="module">

import { addProduct } from "./admin.js";
import { logout } from "./admin.js";
import { protectAdmin } from "./auth-guard.js";

/* =========================
SECURITY CHECK (ADMIN ONLY)
========================= */
protectAdmin();

/* =========================
ADD PRODUCT BUTTON
========================= */
document
.getElementById("addProductBtn")
.addEventListener(
"click",
addProduct
);

/* =========================
LOGOUT BUTTON
========================= */
document
.getElementById("logoutBtn")
.addEventListener(
"click",
logout
);

</script>

</body>

</html>
